<!doctype html> <html lang="zh-CN"> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>填空故事 · 生成海报</title> <link rel="stylesheet" href="/css/style.css"> </head> <body> <div class="page"> <div class="header"> <img class="logo" src="/images/logo.png" alt="logo" onerror="this.style.display='none'"> <h1>填空故事 · 生成海报</h1> </div> <div class="actions"> <button id="btnMake" type="button">生成海报</button> <button id="btnDownload" class="secondary" type="button" disabled>下载图片</button> <a class="secondary" href="/" style="text-decoration:none"><button type="button" class="secondary">返回填写页面</button></a> </div> <div class="poster-wrap"> <div class="poster" id="posterPreviewBox"> <img id="bgPreview" class="bg" alt="背景预览" /> <div class="layer"> <div class="title" id="titleText">我的填空故事</div> <div class="desc" id="descText">（这里将显示你的故事摘要）</div> <div class="footer" id="footerText">© JTtown · 生成于 <span id="now"></span></div> </div> </div> </div> <div class="hint">如果点击“生成海报”后没有出现图片，请检查 /images 目录下是否存在背景图，或更换为更小的图片。</div> <div class="poster-wrap" style="margin-top:12px;"> <img id="posterImg" alt="海报图片预览" /> </div> </div> <script> // 读取 URL 参数 story function getQuery(name){ const m = location.search.match(new RegExp('[?&]'+name+'=([^&]+)')); return m ? decodeURIComponent(m[1]) : ''; } function drawMultiline(ctx, text, x, y, maxWidth, lineHeight){ const paragraphs = String(text).split(/\n/); let cursorY = y; for (const p of paragraphs){ const chars = p.split(''); let line = ''; for (const ch of chars){ const test = line + ch; if (ctx.measureText(test).width > maxWidth){ ctx.fillText(line, x, cursorY); line = ch; cursorY += lineHeight; }else{ line = test; } } ctx.fillText(line, x, cursorY); cursorY += lineHeight; } return cursorY; } function loadImage(src){ return new Promise((resolve, reject)=>{ const img = new Image(); img.onload = ()=>resolve(img); img.onerror = reject; img.src = src; }); } async function generatePoster(story){ const width = 1080, height = 1920, padding = 80; const BG_PATH = '/images/20191013085503_eyefs.jpg'; // 默认整幅背景 const canvas = document.createElement('canvas'); const dpr = window.devicePixelRatio || 1; canvas.width = width * dpr; canvas.height = height * dpr; canvas.style.width = width+'px'; canvas.style.height = height+'px'; const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); let bg = null; try { bg = await loadImage(BG_PATH); } catch(e){ bg = null; } if (bg){ ctx.drawImage(bg, 0, 0, width, height); // 直接铺满 ctx.fillStyle = 'rgba(255,255,255,0.78)'; // 白色遮罩提高可读性 ctx.fillRect(0,0,width,height); } else { const grd = ctx.createLinearGradient(0,0,0,height); grd.addColorStop(0,'#fefefe'); grd.addColorStop(1,'#eef2f7'); ctx.fillStyle = grd; ctx.fillRect(0,0,width,height); } ctx.fillStyle = '#111'; ctx.font = 'bold 48px "PingFang SC","Microsoft YaHei",system-ui'; ctx.textBaseline = 'top'; ctx.fillText('我的填空故事', padding, padding); ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(padding, padding + 70); ctx.lineTo(width - padding, padding + 70); ctx.stroke(); ctx.fillStyle = '#111827'; ctx.font = '32px "PingFang SC","Microsoft YaHei",system-ui'; const contentX = padding; const contentY = padding + 100; const contentW = width - padding*2; const lineH = 48; const endY = drawMultiline(ctx, story, contentX, contentY, contentW, lineH); ctx.fillStyle = '#6b7280'; ctx.font = '24px "PingFang SC","Microsoft YaHei",system-ui'; const footer = new Date().toLocaleString(); ctx.fillText('生成于：' + footer, padding, Math.min(endY + 20, height - padding - 40)); ctx.textAlign = 'right'; ctx.fillText('长按保存图片', contentX + contentW, Math.min(endY + 20, height - padding - 40)); ctx.textAlign = 'left'; return new Promise(resolve=>{ canvas.toBlob(blob=>{ resolve(URL.createObjectURL(blob)); }, 'image/png', 0.92); }); } (function init(){ document.getElementById('now').textContent = new Date().toLocaleString(); const story = getQuery('story') || '（未获取到故事内容，请返回上一页填写）'; document.getElementById('descText').textContent = story; document.getElementById('bgPreview').src = '/images/20191013085503_eyefs.jpg'; const btnMake = document.getElementById('btnMake'); const btnDownload = document.getElementById('btnDownload'); const posterImg = document.getElementById('posterImg'); btnMake.addEventListener('click', async ()=>{ btnMake.disabled = true; btnMake.textContent = '生成中…'; try{ const url = await generatePoster(story); posterImg.src = url; btnDownload.disabled = false; }catch(e){ alert('生成失败：请检查图片路径 /images/20191013085503_eyefs.jpg 是否存在'); console.error(e); }finally{ btnMake.disabled = false; btnMake.textContent = '生成海报'; } }); btnDownload.addEventListener('click', ()=>{ if (!posterImg.src) return; const a = document.createElement('a'); a.href = posterImg.src; a.download = '我的填空故事海报.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }); })(); </script> </body> </html>
