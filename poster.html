<!doctype html> <html lang="zh-CN"> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>填空故事 · 生成海报（无背景版）</title> <link rel="stylesheet" href="/css/style.css"> </head> <body> <div class="page"> <div class="header"> <h1>填空故事 · 生成海报（无背景）</h1> </div> <div class="actions"> <button id="btnMake" type="button">生成海报</button> <button id="btnDownload" class="secondary" type="button" disabled>下载图片</button> <a class="secondary" href="/" style="text-decoration:none"><button type="button" class="secondary">返回填写页面</button></a> </div> <div class="poster-wrap"> <div class="poster" id="posterPreviewBox"> <!-- 无背景图，直接显示文字层 --> <div class="layer"> <div class="title">我的填空故事</div> <div class="desc" id="descText">（这里将显示你的故事摘要）</div> <div class="footer">© JTtown · 生成于 <span id="now"></span></div> </div> </div> </div> <div class="hint">此版本不使用背景图片。点击“生成海报”后将生成纯色底的长图。</div> <div class="poster-wrap" style="margin-top:12px;"> <img id="posterImg" alt="海报图片预览" /> </div> </div> <script> // 解析 URL 参数 function getQuery(name){ const m = location.search.match(new RegExp('[?&]'+name+'=([^&]+)')); return m ? decodeURIComponent(m[1]) : ''; } // 文本绘制（逐字换行） function drawMultiline(ctx, text, x, y, maxWidth, lineHeight){ const paragraphs = String(text).split(/\n/); let cursorY = y; for (const p of paragraphs){ const chars = p.split(''); let line = ''; for (const ch of chars){ const test = line + ch; if (ctx.measureText(test).width > maxWidth){ ctx.fillText(line, x, cursorY); line = ch; cursorY += lineHeight; }else{ line = test; } } ctx.fillText(line, x, cursorY); cursorY += lineHeight; } return cursorY; } // 生成海报（无背景，纯色底） async function generatePoster(story){ const width = 1080, height = 1920, padding = 80; const canvas = document.createElement('canvas'); const dpr = window.devicePixelRatio || 1; canvas.width = width * dpr; canvas.height = height * dpr; canvas.style.width = width+'px'; canvas.style.height = height+'px'; const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); // 纯色背景（你可改为其他颜色） ctx.fillStyle = '#f7fafc'; ctx.fillRect(0,0,width,height); // 标题 ctx.fillStyle = '#111'; ctx.font = 'bold 48px "PingFang SC","Microsoft YaHei",system-ui'; ctx.textBaseline = 'top'; ctx.fillText('我的填空故事', padding, padding); // 装饰线 ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(padding, padding + 70); ctx.lineTo(width - padding, padding + 70); ctx.stroke(); // 正文 ctx.fillStyle = '#111827'; ctx.font = '32px "PingFang SC","Microsoft YaHei",system-ui'; const contentX = padding; const contentY = padding + 100; const contentW = width - padding*2; const lineH = 48; const endY = drawMultiline(ctx, story, contentX, contentY, contentW, lineH); // 底部信息 ctx.fillStyle = '#6b7280'; ctx.font = '24px "PingFang SC","Microsoft YaHei",system-ui'; const footer = new Date().toLocaleString(); ctx.fillText('生成于：' + footer, padding, Math.min(endY + 20, height - padding - 40)); ctx.textAlign = 'right'; ctx.fillText('长按保存图片', contentX + contentW, Math.min(endY + 20, height - padding - 40)); ctx.textAlign = 'left'; return new Promise(resolve=>{ canvas.toBlob(blob=>{ resolve(URL.createObjectURL(blob)); }, 'image/png', 0.92); }); } // 初始化与事件 (function init(){ const nowSpan = document.getElementById('now'); if (nowSpan) nowSpan.textContent = new Date().toLocaleString(); const story = getQuery('story') || '（未获取到故事内容，请返回上一页填写）'; const desc = document.getElementById('descText'); if (desc) desc.textContent = story; const btnMake = document.getElementById('btnMake'); const btnDownload = document.getElementById('btnDownload'); const posterImg = document.getElementById('posterImg'); btnMake.addEventListener('click', async ()=>{ btnMake.disabled = true; btnMake.textContent = '生成中…'; try{ const url = await generatePoster(story); posterImg.src = url; btnDownload.disabled = false; }catch(e){ alert('生成失败：请刷新页面重试'); console.error(e); }finally{ btnMake.disabled = false; btnMake.textContent = '生成海报'; } }); btnDownload.addEventListener('click', ()=>{ if (!posterImg.src) return; const a = document.createElement('a'); a.href = posterImg.src; a.download = '我的填空故事海报.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }); })(); </script> </body> </html>
